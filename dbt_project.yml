name: nyc_cab_analytics
version: "1.0.0"
config-version: 2

profile: nyc_cab_analytics
model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
clean-targets: ["target", "dbt_packages", "data/nyc_cabs.duckdb"]

vars:
  high_value_fare_threshold: 50
  trip_filters:
    start_date: null
    end_date: null
    pickup_boroughs: []
    payment_types: []
    min_distance_miles: 0
  fare_segments:
    - {name: short, min_miles: 0, max_miles: 2}
    - {name: medium, min_miles: 2, max_miles: 10}
    - {name: long, min_miles: 10, max_miles: null}
  payment_type_groups:
    - {name: credit_card, values: [1]}
    - {name: cash, values: [2]}
    - {name: other, values: [3, 4, 5, 6]}
  payment_pivot_dimensions: [pickup_month, pickup_borough]
  include_payment_revenue: true
  summary_metrics:
    - trip_distance_miles
    - fare_amount
    - tip_amount
    - total_amount

models:
  nyc_cab_analytics:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table
    exports:
      +materialized: external
