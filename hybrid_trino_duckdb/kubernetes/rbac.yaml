apiVersion: v1
kind: Namespace
metadata:
  name: data-jobs
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hybrid-pipeline
  namespace: data-jobs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-pod-launcher
  namespace: data-jobs
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-launches-pipeline-pods
  namespace: data-jobs
subjects:
  # Replace these values with the ServiceAccount used by your Stackable
  # Airflow scheduler/executor pods.
  - kind: ServiceAccount
    name: airflow-service-account
    namespace: airflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: airflow-pod-launcher
