apiVersion: v1
kind: Secret
metadata:
  name: hybrid-pipeline-secrets
  namespace: data-jobs
type: Opaque
stringData:
  TRINO_HOST: trino.example.internal
  TRINO_PORT: "443"
  TRINO_HTTP_SCHEME: https
  TRINO_USER: airflow
  TRINO_CATALOG: production
  TRINO_SCHEMA: analytics
  TRINO_SQL_PROFILE: production
  OUTPUT_URI: s3://writable-bucket/hybrid/delta
  AWS_REGION: eu-central-1
  # Prefer workload identity. Add temporary AWS credentials only if required.
