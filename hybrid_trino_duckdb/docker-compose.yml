services:
  trino:
    image: trinodb/trino:482
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/v1/info"]
      interval: 5s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 30

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/hybrid"]

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    command: airflow standalone
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "60"
      HYBRID_PROJECT_DIR: /opt/project
      PYTHON: /home/airflow/.local/bin/python
      OUTPUT_URI: ${OUTPUT_URI:-s3://hybrid/delta}
      TRINO_HOST: ${TRINO_HOST:-trino}
      TRINO_PORT: ${TRINO_PORT:-8080}
      TRINO_HTTP_SCHEME: ${TRINO_HTTP_SCHEME:-http}
      TRINO_USER: ${TRINO_USER:-airflow}
      TRINO_CATALOG: ${TRINO_CATALOG:-tpch}
      TRINO_SCHEMA: ${TRINO_SCHEMA:-tiny}
      TRINO_SQL_PROFILE: ${TRINO_SQL_PROFILE:-tpch}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://minio:9000}
      AWS_ALLOW_HTTP: ${AWS_ALLOW_HTTP:-true}
      AWS_FORCE_PATH_STYLE: ${AWS_FORCE_PATH_STYLE:-true}
      DELTA_TARGET_FILE_SIZE: ${DELTA_TARGET_FILE_SIZE:-536870912}
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./:/opt/project
      - airflow_state:/opt/airflow
    depends_on:
      trino:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  airflow_state:
  minio_data:
