version: 2

models:
  - name: customer
    description: Customer SCD2 Delta table published by the customer Airflow task.
    meta:
      source_query_engine: trino
      write_engine: delta-rs
      dbt_adapter: duckdb
      storage: s3
      storage_format: delta
      orchestration: airflow
    columns:
      - name: tenant_id
        description: Tenant boundary; part of the composite customer key and physical S3 partition.
        data_tests: [not_null]
      - name: customer_id
        data_tests: [not_null]
      - name: valid_from
        data_tests: [not_null]
      - name: valid_to
        data_tests: [not_null]
      - name: is_current
        data_tests: [not_null]
  - name: account
    description: Account SCD2 Delta table published after customer.
    meta:
      source_query_engine: trino
      upstream_read_engine: duckdb
      write_engine: delta-rs
      dbt_adapter: duckdb
      storage: s3
      storage_format: delta
      orchestration: airflow
    columns:
      - name: tenant_id
        description: Tenant boundary; part of every account/customer join and physical S3 partition.
        data_tests: [not_null]
      - name: account_id
        data_tests: [not_null]
      - name: customer_id
        data_tests: [not_null]
      - name: is_current
        data_tests: [not_null]
  - name: transactions
    description: Immutable transaction facts replaced idempotently by business-date partition.
    meta:
      source_query_engine: trino
      upstream_read_engine: duckdb
      write_engine: delta-rs
      dbt_adapter: duckdb
      storage: s3
      storage_format: delta
      orchestration: airflow
    columns:
      - name: tenant_id
        description: Tenant boundary and first physical partition column.
        data_tests: [not_null]
      - name: transaction_id
        data_tests: [not_null]
      - name: account_id
        data_tests: [not_null]
      - name: business_date
        data_tests: [not_null]
