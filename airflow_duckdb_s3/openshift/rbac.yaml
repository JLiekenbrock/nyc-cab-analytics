apiVersion: v1
kind: ServiceAccount
metadata:
  name: duckdb-s3-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-pod-launcher
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "patch", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-pod-launcher
subjects:
  # Change this to the user represented by the kubeconfig mounted in Airflow.
  - kind: User
    apiGroup: rbac.authorization.k8s.io
    name: replace-with-openshift-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: airflow-pod-launcher
