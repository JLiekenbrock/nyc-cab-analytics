airflow_duckdb_s3:
  target: openshift
  outputs:
    openshift:
      type: duckdb
      path: /tmp/dbt.duckdb
      threads: 4
      extensions: [httpfs, parquet]
      secrets:
        - type: s3
          provider: config
          key_id: "{{ env_var('AWS_ACCESS_KEY_ID') }}"
          secret: "{{ env_var('AWS_SECRET_ACCESS_KEY') }}"
          session_token: "{{ env_var('AWS_SESSION_TOKEN', '') }}"
          region: "{{ env_var('AWS_REGION', 'eu-central-1') }}"
          endpoint: "{{ env_var('AWS_ENDPOINT_URL', '') }}"
          use_ssl: "{{ env_var('S3_USE_SSL', 'true') }}"
          url_style: "{{ env_var('S3_URL_STYLE', 'vhost') }}"
      settings:
        memory_limit: "{{ env_var('DUCKDB_MEMORY_LIMIT', '4GB') }}"
        temp_directory: /tmp/duckdb
        preserve_insertion_order: false
    local:
      type: duckdb
      path: /tmp/dbt-local.duckdb
      threads: 2
      extensions: [parquet]

