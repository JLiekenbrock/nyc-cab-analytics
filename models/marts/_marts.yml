version: 2

models:
  - name: daily_trip_summary
    description: Daily yellow taxi metrics grouped by pickup borough.
    columns:
      - name: pickup_date
        data_tests: [not_null]
      - name: pickup_borough
        data_tests: [not_null]
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns: [pickup_date, pickup_borough]
  - name: monthly_borough_performance
    description: Monthly borough KPIs generated from the configured metric list.
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns: [pickup_month, pickup_borough]
    columns:
      - name: pickup_month
        data_tests: [not_null]
      - name: high_value_trip_rate
        data_tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 1
  - name: fare_segment_summary
    description: Parameterized monthly metrics by configurable distance-based fare segment.
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns: [pickup_month, pickup_borough, fare_segment]
    columns:
      - name: fare_segment
        data_tests:
          - accepted_values:
              arguments:
                values: [short, medium, long, unclassified]
  - name: payment_type_pivot
    description: Jinja-generated pivot whose dimensions, payment groups, and revenue columns are project variables.
    columns:
      - name: total_trip_count
        data_tests:
          - accepted_range:
              arguments:
                min_value: 1
  - name: metric_catalog
    description: Demonstrates a macro that generates multiple aggregate expressions from metric and aggregation lists.
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns: [pickup_month, pickup_borough]

exposures:
  - name: local_taxi_performance_dashboard
    label: Local taxi performance dashboard
    type: dashboard
    maturity: low
    description: Example downstream consumer shown in the dbt lineage graph.
    depends_on:
      - ref('daily_trip_summary')
      - ref('monthly_borough_performance')
      - ref('fare_segment_summary')
      - ref('payment_type_pivot')
    owner:
      name: Analytics team
      email: analytics@example.com
